name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  POSTGRES_DB: tk182_portal
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: 127.0.0.1
  POSTGRES_PORT: "5432"
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/tk182_portal
  API_HOST: 127.0.0.1
  API_PORT: "3001"
  WEB_HOST: 127.0.0.1
  WEB_PORT: "3000"
  WEB_PUBLIC_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
  API_INTERNAL_URL: http://127.0.0.1:3001
  NEXT_PUBLIC_APP_NAME: Портал ТК 182
  SESSION_COOKIE_SECURE: "false"
  FILE_STORAGE_DIR: storage/uploads
  FILE_STORAGE_MAX_BYTES: "10485760"
  FILE_STORAGE_ALLOWED_EXTENSIONS: .pdf,.doc,.docx,.xlsx,.zip,.txt

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-builds
          path: |
            apps/api/dist
            apps/web/.next
            packages/shared-types/dist
          if-no-files-found: error

  e2e-api:
    name: API integration tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tk182_portal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tk182_portal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-builds
          path: .

      - name: Prepare database
        run: pnpm db:setup

      - name: Run API e2e suite
        run: pnpm test:e2e:api

  e2e-web:
    name: Web runtime tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tk182_portal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tk182_portal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-builds
          path: .

      - name: Prepare database
        run: pnpm db:setup

      - name: Run web e2e suite
        run: pnpm test:e2e:web

  e2e-browser:
    name: Browser e2e tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tk182_portal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tk182_portal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-builds
          path: .

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium and Linux deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Ensure cached Playwright Chromium is available
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install chromium

      - name: Prepare database
        run: pnpm db:setup

      - name: Run browser e2e suite
        env:
          PLAYWRIGHT_API_PORT: "3001"
          PLAYWRIGHT_WEB_PORT: "3000"
        run: pnpm test:e2e:browser:ci

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
