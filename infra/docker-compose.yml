name: tk182-portal

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tk182_portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tk182_portal}
      POSTGRES_HOST: postgres
      WEB_PUBLIC_URL: http://127.0.0.1:3000
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      api:
        condition: service_started
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      API_INTERNAL_URL: http://api:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
